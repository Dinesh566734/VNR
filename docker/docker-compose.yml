name: sentinel-upi

services:
  sentinel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sentinel-upi:latest
    container_name: sentinel-api
    restart: unless-stopped
    depends_on:
      redis-graph:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      SENTINEL_ENVIRONMENT: production
      REDIS_URL: redis://redis-graph:6379/0
      AWS_REGION: ap-south-1
    volumes:
      - ../data/processed:/app/data/processed
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis-graph:
    image: redislabs/redisgraph:2.12.10
    container_name: redis-graph
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
